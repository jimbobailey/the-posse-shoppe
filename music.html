<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Posse Shoppe - Music</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        header {
            background: #1a1a1a;
            padding: 20px;
            border-bottom: 3px solid orange;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: orange;
        }

        .nav-links {
            margin-top: 15px;
        }

        .page-btn {
            display: inline-block;
            margin: 5px;
            padding: 10px 18px;
            background: #222;
            color: white;
            text-decoration: none;
            border: 2px solid orange;
            border-radius: 6px;
            transition: 0.3s;
        }

        .page-btn:hover {
            background: orange;
            color: black;
        }

        .music-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #1b1b1b;
            border: 2px solid orange;
            border-radius: 10px;
        }

        h1 {
            color: orange;
            margin-bottom: 10px;
        }

        .song-title {
            font-size: 28px;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }

        .download-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: orange;
            color: black;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #ffb84d;
        }

        .note {
            margin-top: 20px;
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">THE POSSE SHOPPE MUSIC</div>

    <div class="nav-links">
        <a class="page-btn" href="index.html">HOME</a>
        <a class="page-btn" href="music.html">MUSIC</a>
    </div>
</header>

<div class="music-container">

    <h1>NOW PLAYING</h1>

    <div class="song-title">
        We'll Be Yo Huckleberry
    </div>

    <audio controls>
        <source src="music/well-be-yo-huckleberry.m4a" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <br>

    <a class="download-btn"
       href="music/well-be-yo-huckleberry.m4a"
       download>
       DOWNLOAD SONG
    </a>

    <div class="note">
        Free download from The Posse Shoppe.
    </div>

</div>

</body>
</html>

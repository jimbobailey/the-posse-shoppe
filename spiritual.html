<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Posse Shoppe - Spiritual Music</title>
<style>
body{

.logo{

}

.jimenim-header{

.cover-art{

<header>
    <div class="logo">~ Jimenim</div>
    <br>
    <a class="page-btn" href="index.html">HOME</a>

        Be Anxious For Nothing
    </div>

    <audio controls>

    <br><br>

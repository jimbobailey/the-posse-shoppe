            border: 2px solid orange;
            margin-bottom: 20px;
        }

            width: 100%;
            margin-top: 20px;
        }

        .download-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: orange;
            color: black;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;

            transition: 0.3s;

            background: #ffb84d;

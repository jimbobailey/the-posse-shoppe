<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Posse Shoppe</title>

<style>
:root{
--primary:#121212;
--glow:#ff8c00;
--bg:#ffffff;
--muted:#666;
--danger:#c62828;
--success:#167c3b;
}

*{box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:var(--bg);
color:#111;
}

header{
padding:20px 20px 28px;
text-align:center;
border-bottom:2px solid var(--glow);
background:
linear-gradient(rgba(10,10,10,.82),rgba(10,10,10,.82)),
url("images/hex-bg.png") center center/cover no-repeat;
}

.header-banner-wrap{
max-width:1120px;
margin:0 auto 18px;
padding:18px;
border-radius:12px;
}

.header-banner{
display:block;
width:100%;
max-width:1000px;
margin:0 auto;
height:auto;
border-radius:10px;
border:1px solid rgba(255,140,0,.45);
box-shadow:0 0 22px rgba(255,140,0,.22);
background:#111;
}

.sr-only{
position:absolute;
width:1px;
height:1px;
padding:0;
margin:-1px;
overflow:hidden;
clip:rect(0,0,0,0);
white-space:nowrap;
border:0;
}

nav{
margin-top:15px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.nav-btn{
background:rgba(0,0,0,.65);
border:1px solid var(--glow);
color:white;
padding:8px 15px;
cursor:pointer;
border-radius:4px;
}

.nav-btn.active{
background:var(--glow);
color:black;
font-weight:bold;
}

/* CONTACT BUTTON */
.contact-link{
background:rgba(0,0,0,.45);
color:var(--glow);
border:2px solid var(--glow);
padding:8px 16px;
cursor:pointer;
margin:18px auto 0;
display:inline-block;
border-radius:4px;
font-weight:bold;
text-decoration:none;
}

.contact-link:hover{
background:var(--glow);
color:black;
}

.main-layout{
display:flex;
max-width:1500px;
margin:20px auto;
gap:30px;
padding:0 20px 30px;
align-items:flex-start;
}

#product-list{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
background:white;
}

.img-box{
width:100%;
height:250px;
background:#f4f4f4;
margin-bottom:15px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border-radius:6px;
}

.img-box img,
.img-box video{
width:100%;
height:100%;
object-fit:contain;
background:#f4f4f4;
}

.add-btn{
background:var(--primary);
color:white;
padding:14px;
width:100%;
cursor:pointer;
margin-top:12px;
border:none;
border-radius:4px;
font-weight:bold;
}

.cart-sidebar{
flex:1;
min-width:340px;
border:1px solid #ddd;
border-radius:8px;
padding:18px;
background:#fafafa;
position:sticky;
top:20px;
}

.cart-item{
border:1px solid #ddd;
border-radius:6px;
padding:10px;
margin-bottom:10px;
background:white;
}

.cart-total{
font-size:1.15rem;
font-weight:bold;
margin:12px 0 16px;
padding-top:10px;
border-top:1px solid #ddd;
}

.submit-order-btn{
width:100%;
margin-top:16px;
padding:14px;
border:none;
border-radius:4px;
background:var(--glow);
color:black;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

@media(max-width:980px){
.main-layout{
flex-direction:column;
}

.cart-sidebar{
position:static;
width:100%;
min-width:0;
}
}
</style>
</head>

<body>

<header>

<div class="header-banner-wrap">
<img src="images/header.png" alt="The Posse Shoppe" class="header-banner">
</div>

<h1 class="sr-only">The Posse Shoppe</h1>

<nav>
<button class="nav-btn active" id="btn-3d" onclick="view('3d')">3D Prints</button>
<button class="nav-btn" id="btn-laser" onclick="view('laser')">Laser Engraving</button>
</nav>

<a class="contact-link"
href="mailto:theposseshoppe@gmail.com?subject=Question%20from%20The%20Posse%20Shoppe">
CONTACT US
</a>

</header>

<div class="main-layout">

<div id="product-list"></div>

<aside class="cart-sidebar">
<h2 style="margin-top:0;">Your Order</h2>

<div id="cart-items">Empty</div>

<div class="cart-total" id="cart-total">$0.00</div>

<button class="submit-order-btn" id="submit-order-btn" onclick="submitOrder()">SEND ORDER REQUEST</button>

</aside>

</div>

<script>

let currentCategory="3d"
let cart=[]
let allProducts=[]

function view(v){
currentCategory=v
document.getElementById("btn-3d").classList.remove("active")
document.getElementById("btn-laser").classList.remove("active")
document.getElementById("btn-"+v).classList.add("active")
renderShop()
}

async function loadProducts(){
const response=await fetch("/.netlify/functions/products",{cache:"no-store"})
const data=await response.json()
allProducts=Array.isArray(data)?data:[]
renderShop()
}

function getCurrentProducts(){
return allProducts.filter(product=>product.category===currentCategory)
}

function buildMediaPath(item){
const filename=item.img||""
if(item.mediaType==="video"){
return `/videos/${item.category}/${filename}`
}
return `/images/${item.category}/${filename}`
}

function addToCart(id){
const item=allProducts.find(x=>String(x.id)===String(id))
if(!item)return

const existing=cart.find(x=>x.id===item.id)

if(existing){
existing.qty++
}else{
cart.push({
id:item.id,
name:item.name,
price:Number(item.price),
qty:1
})
}

renderCart()
}

function renderCart(){

const box=document.getElementById("cart-items")
const totalBox=document.getElementById("cart-total")

if(!cart.length){
box.innerHTML="Empty"
totalBox.textContent="$0.00"
return
}

let total=0

box.innerHTML=cart.map((item,index)=>{
const line=item.price*item.qty
total+=line

return `
<div class="cart-item">
<strong>${item.name}</strong><br>
Qty: ${item.qty}<br>
$${line.toFixed(2)}
</div>`
}).join("")

totalBox.textContent=`Estimated Total: $${total.toFixed(2)}`
}

function renderShop(){

const list=document.getElementById("product-list")
const items=getCurrentProducts()

if(items.length===0){
list.innerHTML=`<div class="card"><b>No products yet</b></div>`
return
}

list.innerHTML=items.map(item=>`
<div class="card">
<div class="img-box">
<img src="${buildMediaPath(item)}">
</div>
<b>${item.name}</b>
<p><strong>$${Number(item.price).toFixed(2)}</strong></p>
<button class="add-btn" onclick="addToCart('${item.id}')">ADD TO ORDER</button>
</div>
`).join("")
}

async function submitOrder(){
alert("Order system unchanged.")
}

window.onload=async()=>{
renderCart()
await loadProducts()
}

</script>

</body>
</html>

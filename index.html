<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Posse Shoppe</title>
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    <style>
        :root { --primary: #121212; --glow: #ff8c00; --bg: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); }
        header { 
            background: var(--primary); 
            background-image: radial-gradient(circle at center, rgba(255, 140, 0, 0.2) 0%, transparent 70%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><g fill="none" stroke="%23ff8c00" stroke-width="0.5" stroke-opacity="0.3"><path d="M0 50 L100 50 M50 0 L50 100 M0 0 L100 100 M100 0 L0 100" /><circle cx="50" cy="50" r="40" /><circle cx="50" cy="50" r="20" /></g></svg>');
            background-size: cover, 150px 150px;
            color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--glow); 
        }
        h1 { color: var(--glow); margin: 0; text-transform: uppercase; letter-spacing: 5px; font-size: 3rem; text-shadow: 0 0 15px var(--glow); }
        nav { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .nav-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--glow); color: white; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .nav-btn.active { background: var(--glow); color: black; }
        .admin-link { background: none; color: #ff8c00; border: 2px solid #ff8c00; padding: 8px 16px; font-size: 14px; cursor: pointer; margin: 20px auto 0 auto; display: block; border-radius: 4px; font-weight: bold; }
        
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; color: white; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1200px; margin: 0 auto; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 12px; background: #222; border: 1px solid var(--glow); color: white; border-radius: 4px; font-family: inherit; box-sizing: border-box; }
        .admin-form label { color: var(--glow); font-weight: bold; font-size: 14px; margin-top: 5px; }
        .admin-nav { display: flex; justify-content: space-between; margin-bottom: 20px; grid-column: 1 / -1; }
        .close-btn { background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        .swatch-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; position: relative; }
        .swatch.selected { border-color: var(--glow); box-shadow: 0 0 8px var(--glow); }
        .swatch:hover::after { content: attr(data-name); position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; }

        .main-layout { display: flex; max-width: 1400px; margin: 20px auto; gap: 30px; padding: 0 20px; }
        #product-list { flex: 3; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .img-box { width: 100%; height: 220px; background: #f4f4f4; margin-bottom: 15px; border-radius: 4px; overflow: hidden; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .cart-sidebar { flex: 1; border: 2px solid var(--primary); padding: 25px; height: fit-content; position: sticky; top: 10px; background: #fff; border-radius: 12px; }
        .add-btn { background: var(--primary); color: white; border: 1px solid var(--glow); padding: 14px; width: 100%; font-weight: bold; cursor: pointer; margin-top: auto; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h1>The Posse Shoppe</h1>
    <nav>
        <button class="nav-btn active" id="btn-3d" onclick="view('3d')">3D Prints</button>
        <button class="nav-btn" id="btn-laser" onclick="view('laser')">Laser Engraving</button>
        <button class="nav-btn" onclick="alert('Contact: theposseshoppe@gmail.com')">Support</button>
    </nav>
    <button class="admin-link" onclick="openAdmin()">MERCHANT ACCESS</button>
</header>

<div id="admin-panel">
    <div class="admin-grid">
        <div class="admin-nav">
            <button class="close-btn" onclick="closeAdmin()">CLOSE & EXIT</button>
        </div>
        
        <div class="admin-form">
            <h2 style="color:var(--glow); border-bottom: 1px solid #333; padding-bottom: 10px;">Product Entry</h2>
            <label>Category</label>
            <select id="p-page"><option value="3d">3D Prints</option><option value="laser">Laser Engraving</option></select>
            <label>Product Name</label><input type="text" id="p-name">
            <label>Price ($)</label><input type="number" id="p-price" step="0.01">
            <label>Description</label><textarea id="p-desc" rows="3"></textarea>
            <label>Image Filename</label><input type="text" id="p-img" placeholder="dragon.jpg">
            <button onclick="saveItem()" style="background:var(--glow); border:none; padding:15px; color:black; font-weight:bold; cursor:pointer; border-radius:4px;">SAVE PRODUCT</button>
            <div id="admin-inventory-list" style="margin-top:20px;"></div>
        </div>

        <div class="admin-form">
            <h2 style="color:var(--glow); border-bottom: 1px solid #333; padding-bottom: 10px;">Color Swatch Library</h2>
            <label>Color Name</label><input type="text" id="s-name" placeholder="e.g. Neon Orange">
            <label>Hex Code / CSS Color</label><input type="text" id="s-color" placeholder="#ff8c00">
            <button onclick="saveSwatch()" style="background:#444; border:1px solid var(--glow); padding:15px; color:white; font-weight:bold; cursor:pointer; border-radius:4px;">ADD COLOR TO LIBRARY</button>
            <div id="admin-swatch-list" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<div class="main-layout">
    <div id="product-list"></div>
    <div class="cart-sidebar">
        <h3 style="color:var(--glow); margin-top:0;">Your Order</h3>
        <div id="cart-items" style="min-height:40px; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px; font-size:14px;">Empty</div>
        <div style="font-size:15px; line-height: 1.6;">
            <div style="display:flex; justify-content:space-between;"><span>Subtotal:</span><span id="sub-total">$0.00</span></div>
            <div style="display:flex; justify-content:space-between;"><span>Tax (7.5%):</span><span id="tax-total">$0.00</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem; margin-top:10px; color:var(--primary);"><span>Total:</span><span id="final-total">$0.00</span></div>
        </div>
        <div id="paypal-button-container" style="margin-top:25px;"></div>
    </div>
</div>

<script>
    let currentCategory = '3d';
    let cart = [];
    let selectedColors = {};

    function openAdmin() { 
        document.getElementById('admin-panel').style.display = 'block'; 
        renderAdminInventory(); 
        renderAdminSwatches(); 
    }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    function view(v) {
        currentCategory = v;
        document.getElementById('btn-3d').classList.toggle('active', v === '3d');
        document.getElementById('btn-laser').classList.toggle('active', v === 'laser');
        renderShop();
    }

    function saveSwatch() {
        const name = document.getElementById('s-name').value;
        const color = document.getElementById('s-color').value;
        if(!name || !color) return;
        let swatches = JSON.parse(localStorage.getItem('posse_swatches')) || [];
        swatches.push({ id: Date.now(), name, color });
        localStorage.setItem('posse_swatches', JSON.stringify(swatches));
        document.getElementById('s-name').value = ''; document.getElementById('s-color').value = '';
        renderAdminSwatches(); renderShop();
    }

    function deleteSwatch(id) {
        let swatches = JSON.parse(localStorage.getItem('posse_swatches')) || [];
        localStorage.setItem('posse_swatches', JSON.stringify(swatches.filter(s => s.id != id)));
        renderAdminSwatches(); renderShop();
    }

    function renderAdminSwatches() {
        const list = document.getElementById('admin-swatch-list');
        let swatches = JSON.parse(localStorage.getItem('posse_swatches')) || [];
        list.innerHTML = '<h3 style="color:var(--glow);">Active Colors</h3>';
        swatches.forEach(s => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:8px; margin-bottom:5px; border-radius:4px;">
                <span><span style="display:inline-block; width:12px; height:12px; background:${s.color}; border-radius:50%; margin-right:8px;"></span>${s.name}</span>
                <button onclick="deleteSwatch(${s.id})" style="background:red; color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:4px; font-size:10px;">REMOVE</button>
            </div>`;
        });
    }

    function saveItem() {
        const cat = document.getElementById('p-page').value;
        const name = document.getElementById('p-name').value;
        const price = parseFloat(document.getElementById('p-price').value);
        const desc = document.getElementById('p-desc').value;
        const img = document.getElementById('p-img').value;
        if(!name || isNaN(price)) { alert("Need Name and Price!"); return; }
        let items = JSON.parse(localStorage.getItem('posse_' + cat)) || [];
        items.push({ id: Date.now(), name, price, desc, img });
        localStorage.setItem('posse_' + cat, JSON.stringify(items));
        document.getElementById('p-name').value = ''; document.getElementById('p-price').value = '';
        document.getElementById('p-desc').value = ''; document.getElementById('p-img').value = '';
        renderShop(); renderAdminInventory();
    }

    function deleteItem(id, cat) {
        let items = JSON.parse(localStorage.getItem('posse_' + cat)) || [];
        localStorage.setItem('posse_' + cat, JSON.stringify(items.filter(i => i.id != id)));
        renderShop(); renderAdminInventory();
    }

    function renderAdminInventory() {
        const list = document.getElementById('admin-inventory-list');
        list.innerHTML = '<h3 style="color:var(--glow);">Current Products</h3>';
        ['3d', 'laser'].forEach(cat => {
            let items = JSON.parse(localStorage.getItem('posse_' + cat)) || [];
            items.forEach(i => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:12px; margin-bottom:8px; border-radius:4px;">
                    <span style="font-size:12px;">[${cat.toUpperCase()}] ${i.name}</span>
                    <button onclick="deleteItem(${i.id}, '${cat}')" style="background:red; color:white; border:none; padding:6px 12px; cursor:pointer; border-radius:4px; font-size:10px;">DELETE</button>
                </div>`;
            });
        });
    }

    function selectColor(productId, colorName) {
        selectedColors[productId] = colorName;
        renderShop();
    }

    function renderShop() {
        const list = document.getElementById('product-list');
        const items = JSON.parse(localStorage.getItem('posse_' + currentCategory)) || [];
        const swatches = JSON.parse(localStorage.getItem('posse_swatches')) || [];
        
        if (items.length === 0) {
            list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 80px 20px; color: #888; border: 2px dashed #ddd; border-radius: 12px;">Category empty.</div>`;
            return;
        }

        list.innerHTML = items.map(i => {
            let swatchHTML = '';
            if (currentCategory === '3d' && swatches.length > 0) {
                swatchHTML = `<div style="margin-bottom:15px;"><label style="font-size:12px; font-weight:bold; color:#666; display:block; margin-bottom:5px;">CHOOSE COLOR:</label><div class="swatch-container">` + 
                    swatches.map(s => `
                        <div class="swatch ${selectedColors[i.id] === s.name ? 'selected' : ''}" 
                             style="background:${s.color}" 
                             data-name="${s.name}" 
                             onclick="selectColor(${i.id}, '${s.name}')"></div>
                    `).join('') + `</div></div>`;
            }

            return `
            <div class="card">
                <div class="img-box">
                    <img src="images/${currentCategory}/${i.img}" onerror="this.src='https://via.placeholder.com/280x220?text=The+Posse+Shoppe'">
                </div>
                <div style="flex-grow:1;">
                    <b style="font-size: 1.2rem; color: #111; display:block; margin-bottom:10px;">${i.name}</b>
                    <div style="background:#f9f9f9; padding:12px; border-radius:6px; font-size:13px; color:#555; margin-bottom:15px; border:1px solid #eee;">${i.desc}</div>
                    ${swatchHTML}
                </div>
                <div style="font-size: 1.5rem; font-weight: bold; color: var(--glow); margin-bottom:15px;">$${i.price.toFixed(2)}</div>
                <button class="add-btn" onclick="addToOrder('${i.name.replace(/'/g, "\\'")}', ${i.price}, ${i.id})">ADD TO ORDER</button>
            </div>`;
        }).join('');
    }

    function addToOrder(n, p, id) { 
        let finalName = n;
        if (currentCategory === '3d') {
            const color = selectedColors[id];
            if (!color) { alert("Please select a color first!"); return; }
            finalName += ` (${color})`;
        }
        cart.push({n: finalName, p}); 
        updateCart(); 
    }

    function updateCart() {
        const sub = cart.reduce((a, b) => a + b.p, 0);
        const tax = sub * 0.075;
        const total = sub + tax;
        document.getElementById('sub-total').innerText = `$${sub.toFixed(2)}`;
        document.getElementById('tax-total').innerText = `$${tax.toFixed(2)}`;
        document.getElementById('final-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('cart-items').innerHTML = cart.length ? cart.map(i => `<div style="margin-bottom:5px; border-bottom:1px solid #f9f9f9; padding-bottom:2px;">${i.n} - $${i.p.toFixed(2)}</div>`).join('') : "Empty";
        renderPayPal(total.toFixed(2));
    }

    function renderPayPal(amt) {
        document.getElementById('paypal-button-container').innerHTML = '';
        if(amt <= 0) return;
        paypal.Buttons({ createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: amt } }] }) }).render('#paypal-button-container');
    }
    window.onload = () => { renderShop(); renderAdminInventory(); renderAdminSwatches(); };
</script>
</body>
</html>

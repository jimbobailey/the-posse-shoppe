<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Posse Shoppe</title>

<meta property="og:title" content="The Posse Shoppe" />
<meta property="og:description" content="Custom 3D prints and laser engraving." />
<meta property="og:image" content="https://theposseshoppe.com/images/header.jpg" />
<meta property="og:url" content="https://theposseshoppe.com/" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="The Posse Shoppe" />
<meta name="twitter:description" content="Custom 3D prints and laser engraving." />
<meta name="twitter:image" content="https://theposseshoppe.com/images/header.jpg" />

<style>

:root{
--primary:#121212;
--glow:#ff8c00;
--bg:#ffffff;
--muted:#666;
--danger:#c62828;
--success:#167c3b;
}

*{box-sizing:border-box;}

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:var(--bg);
color:#111;
}

header{
padding:20px 20px 28px;
text-align:center;
border-bottom:2px solid var(--glow);
background:
linear-gradient(rgba(10,10,10,.88),rgba(10,10,10,.88)),
url("images/hex-bg.png") center/cover no-repeat;
}

.header-banner-wrap{
max-width:1120px;
margin:0 auto 18px;
padding:14px;
border-radius:12px;
}

.header-banner{
display:block;
width:100%;
max-width:1000px;
margin:0 auto;
border-radius:10px;
border:1px solid rgba(255,140,0,.45);
box-shadow:0 0 22px rgba(255,140,0,.22);
background:#111;
}

nav{
margin-top:15px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.nav-btn{
background:rgba(0,0,0,.65);
border:1px solid var(--glow);
color:white;
padding:8px 15px;
cursor:pointer;
border-radius:4px;
}

.nav-btn.active{
background:var(--glow);
color:black;
font-weight:bold;
}

.contact-link{
background:rgba(0,0,0,.45);
color:#ff8c00;
border:2px solid #ff8c00;
padding:8px 16px;
cursor:pointer;
margin:20px auto 0;
display:block;
width:fit-content;
border-radius:4px;
font-weight:bold;
text-decoration:none;
}

.contact-link:hover{
background:#ff8c00;
color:black;
}

.main-layout{
display:flex;
max-width:1500px;
margin:20px auto;
gap:30px;
padding:0 20px 30px;
align-items:flex-start;
}

#product-list{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
background:white;
}

.img-box{
width:100%;
height:250px;
background:#f4f4f4;
margin-bottom:15px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border-radius:6px;
}

.img-box img,
.img-box video{
width:100%;
height:100%;
object-fit:contain;
}

.add-btn{
background:var(--primary);
color:white;
padding:14px;
width:100%;
cursor:pointer;
margin-top:12px;
border:none;
border-radius:4px;
font-weight:bold;
}

.cart-sidebar{
flex:1;
min-width:340px;
border:1px solid #ddd;
border-radius:8px;
padding:18px;
background:#fafafa;
position:sticky;
top:20px;
}

.cart-total{
font-size:1.15rem;
font-weight:bold;
margin:12px 0 16px;
padding-top:10px;
border-top:1px solid #ddd;
}

</style>
</head>

<body>

<header>

<div class="header-banner-wrap">
<img src="images/header.jpg" class="header-banner">
</div>

<nav>
<button class="nav-btn active" id="btn-3d" onclick="view('3d')">3D Prints</button>
<button class="nav-btn" id="btn-laser" onclick="view('laser')">Laser Engraving</button>
</nav>

<a class="contact-link" href="mailto:theposseshoppe@gmail.com?subject=Question%20from%20The%20Posse%20Shoppe">CONTACT US</a>

</header>

<div class="main-layout">

<div id="product-list"></div>

<aside class="cart-sidebar">

<h2 style="margin-top:0;">Your Order</h2>

<div id="cart-items">Empty</div>

<div class="cart-total" id="cart-total">$0.00</div>

</aside>

</div>

<script>

let currentCategory="3d";
let allProducts=[];

function view(v){
currentCategory=v;
document.getElementById("btn-3d").classList.remove("active");
document.getElementById("btn-laser").classList.remove("active");
document.getElementById("btn-"+v).classList.add("active");
renderShop();
}

async function loadProducts(){

const r=await fetch("/.netlify/functions/products",{cache:"no-store"});
const data=await r.json();

allProducts=Array.isArray(data)?data:data.products||[];

renderShop();

}

function getCurrentProducts(){
return allProducts.filter(p=>p.category===currentCategory);
}

function renderShop(){

const list=document.getElementById("product-list");

const items=getCurrentProducts();

if(!items.length){
list.innerHTML="<div class='card'><b>No products yet</b></div>";
return;
}

list.innerHTML=items.map(p=>`

<div class="card">

<div class="img-box">
<img src="/images/${p.category}/${p.img}">
</div>

<b>${p.name}</b>

<p><strong>$${Number(p.price).toFixed(2)}</strong></p>

<p>${p.desc||""}</p>

<button class="add-btn">ADD TO ORDER</button>

</div>

`).join("");

}

window.onload=loadProducts;

</script>

</body>
</html>
